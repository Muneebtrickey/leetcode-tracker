<!DOCTYPE html>
<html>
<head>
    <title>Add Problem</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- 🔙 Back Button -->
    <a href="{% url 'home' %}" class="btn btn-secondary mb-3">← Back</a>

    <!-- 📦 Form Card -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h3 class="mb-4">➕ Add New Problem</h3>

            <form method="POST">
                {% csrf_token %}

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label">Problem Title</label>
                    <input type="text" name="title" class="form-control" placeholder="Enter problem name" required>
                </div>

                <!-- Difficulty -->
                <div class="mb-3">
                    <label class="form-label">Difficulty</label>
                    <select name="difficulty" class="form-select">
                        <option>Easy</option>
                        <option>Medium</option>
                        <option>Hard</option>
                    </select>
                </div>

                <!-- Problem URL -->
                <div class="mb-3">
                    <label class="form-label">Problem URL (optional)</label>
                    <input type="url" name="problem_url" class="form-control" placeholder="https://leetcode.com/problems/...">
                </div>

                <!-- Time Taken -->
                <div class="mb-3">
                    <label class="form-label">Time Taken (minutes)</label>
                    <input type="number" name="time_taken" class="form-control" placeholder="e.g. 25">
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-success w-100">
                    Add Problem
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
